<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>&#26399;&#24453;&#20516;&#12488;&#12521;&#12483;&#12459;&#12540;</title>

  <link rel="stylesheet" href="style.css" />

  <!-- iOS / Web App Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon-180.png?v=9">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png?v=9">
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icon-512.png?v=9">

  <!-- iOS Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="&#26399;&#24453;&#20516;&#12488;&#12521;&#12483;&#12459;&#12540;">
</head>

<body>
  <!-- logo -->
  <h1 class="logo" aria-label="&#26399;&#24453;&#20516;&#12488;&#12521;&#12483;&#12459;&#12540;">
    <img
      src="./assets/logo-ev-tracker.png"
      alt="&#26399;&#24453;&#20516;&#12488;&#12521;&#12483;&#12459;&#12540;"
      class="app-logo"
      decoding="async"
      loading="eager"
    />
  </h1>
  <p class="app-version">Version 1.1</p>

  <main class="container">

    <!-- machine selection and store info -->
    <section class="card" aria-label="&#27231;&#31278;&#24773;&#22577;">
      <div class="machine-row">
        <label class="machine-label">
          &#27231;&#31278;
          <button type="button" id="machinePickerOpen" class="machine-picker-open">
            <span id="selectedMachineName">&#27231;&#31278;&#12434;&#36984;&#25246;</span>
            <span class="machine-picker-open__hint">&#26908;&#32034;</span>
          </button>
          <select id="machineSelect" class="machine-select-native" aria-hidden="true" tabindex="-1"></select>
          <button type="button" id="favoriteBtn" class="chip neutral">&#9734; &#12362;&#27671;&#12395;&#20837;&#12426;</button>
          <p id="infoBorder" class="equivalent-border machine-fade">
  &#12508;&#12540;&#12480;&#12540;&#65306;&#8212; &#22238;/k
</p>
        </label>
        <div class="store-row">
          <label>
            &#24215;&#12434;&#36984;&#25246;
            <button type="button" id="storePickerOpen" class="store-picker-open">
              <span id="selectedStoreName">&#24215;&#33303;&#12434;&#36984;&#25246;</span>
              <span class="store-picker-open__hint">&#26908;&#32034;</span>
            </button>
            <select id="storeSelect"></select>
          </label>
          <button type="button" id="storeAddBtn" class="chip neutral">&#24215;&#33303;&#12434;&#36861;&#21152;</button>
          <button type="button" id="storeSaveBtn" class="chip state is-hidden">&#20445;&#23384;</button>
          <button type="button" id="storeCancelBtn" class="chip sub is-hidden">&#25147;&#12427;</button>
          <label>
            &#24215;
            <input type="text" id="storeName" list="storeList" placeholder="&#24215;&#21517;&#12434;&#20837;&#21147;" />
          </label>
          <div class="exchange-row">
            <label class="exchange-label">
              &#20132;&#25563;&#29575;&#65288;100&#20870;&#12354;&#12383;&#12426;&#65289;
              <select id="exchangeSelect">
                <option value="25">25&#29577;&#65288;&#31561;&#20385;&#65289;</option>
                <option value="28" selected>28&#29577;</option>
                <option value="30">30&#29577;</option>
                <option value="33">33&#29577;</option>
              </select>
            </label>

            <p class="equivalent-border machine-fade is-hidden">
              &#12508;&#12540;&#12480;&#12540;&#65306;&#8212; &#22238;/k
            </p>
          </div>
          <div class="owned-summary">
            <span id="ownedKeyLabel">&#24215;&#12398;&#12524;&#12540;&#12488;&#26410;&#35373;&#23450;</span>
            <strong id="ownedBalance">&#25345;&#12385;&#29577;&#65306;0&#29577;</strong>
            <div class="owned-edit">
              <input type="number" id="ownedBalanceInput" inputmode="numeric" min="0" step="1" placeholder="&#25345;&#12385;&#29577;&#12434;&#20837;&#21147;" />
              <button type="button" id="ownedBalanceSaveBtn" class="chip neutral">&#26356;&#26032;</button>
            </div>
          </div>
        </div>
        
        <div class="rate-row">
          <p id="infoJackpot" class="machine-fade">&#22259;&#26564;&#24403;&#12383;&#12426;&#30906;&#29575;&#65306;&#8212;</p>
          <p id="infoRush" class="machine-fade">&#12521;&#12483;&#12471;&#12517;&#31361;&#20837;&#29575;&#65306;&#8212;</p>
        </div>
      </div>
    </section>

    <!-- &#22238;&#36578;&#12525;&#12464; -->
    <section class="card" id="logCard">

      <!-- header controls -->
      <div class="card-header">
        <h2 class="section-title">&#22238;&#36578;&#12525;&#12464;</h2>
        <button id="btnMidCheck" type="button" class="chip chip-mid-check chip-midcheck-mini">
          &#22238;&#36578;&#29575;&#12481;&#12455;&#12483;&#12463;
        </button>
      </div>

      <div class="log-input">
        <label>
          &#12487;&#12540;&#12479;&#12459;&#12454;&#12531;&#12479;&#12540;&#22238;&#36578;&#25968;
          <input type="number" id="counterNow" inputmode="numeric" />
        </label>

        <div class="log-actions" role="group" aria-label="&#22238;&#36578;&#12525;&#12464;&#12398;&#25805;&#20316;">
          <!-- main log buttons -->
          <div class="log-actions-main" id="logActionsMain">
            <button type="button" class="chip state" id="btnStart">&#38283;&#22987;</button>
            <button type="button" class="chip state" id="btnHit">&#24403;&#12383;&#12426;</button>
            <button type="button" class="chip undo" id="btnUndo">&#25147;&#12377;</button>
            <button type="button" class="chip clear" id="btnStop">&#12516;&#12513;</button>
          </div>

          <!-- buttons shown after hit -->
          <div class="log-actions-after is-hidden" id="logActionsAfter">
  <button type="button" class="chip state" id="btnCharge">&#12481;&#12515;&#12540;&#12472;</button>
  <button type="button" class="chip state" id="btnTan">&#21336;&#30330;</button>
  <button type="button" class="chip state" id="btnRushEnd">RUSH&#32066;&#20102;</button>
  <button type="button" class="chip state" id="btnLtEnd">LT&#32066;&#20102;</button>
  <button type="button" class="chip undo" id="btnUndo2">&#25147;&#12377;</button>
  <div id="rushEndAdjustRow" class="is-hidden">
    <label>
      RUSH&#32066;&#20102;&#24460;&#12398;&#36861;&#21152;&#22238;&#36578;
      <select id="rushEndAdjust">
        <option value="0">+0</option>
        <option value="1">+1</option>
        <option value="2">+2</option>
        <option value="3">+3</option>
        <option value="4">+4</option>
      </select>
    </label>
  </div>
          </div>

          <!-- payout input panel shown for RUSH/LT -->
          <div id="payoutPanel" class="is-hidden">
            <label>
              &#12522;&#12470;&#12523;&#12488;&#34920;&#35352;&#20986;&#29577;
              <input type="number" id="payoutNow" inputmode="numeric" />
            </label>
            <button type="button" class="chip state" id="btnPayoutConfirm">&#34920;&#35352;&#20986;&#29577;&#12434;&#30906;&#23450;</button>
          </div>

          <!-- &#25345;&#12385;&#29577;&#20837;&#21147;&#12497;&#12493;&#12523;&#65288;&#12516;&#12513;&#12398;&#26178;&#12384;&#12369;&#20986;&#12377;&#65289; -->
          <div id="endBallsPanel" class="is-hidden">
            <label>
              &#12516;&#12513;&#26178;&#12398;&#25345;&#12385;&#29577;
              <input type="number" id="endBallsNow" inputmode="numeric" />
            </label>
            <button type="button" class="chip state" id="btnEndBallsConfirm">&#25345;&#12385;&#29577;&#12434;&#30906;&#23450;</button>
          </div>
        </div>

        <p class="log-meta">
          &#21021;&#24403;&#12383;&#12426;&#22238;&#25968; / &#36890;&#24120;&#22238;&#36578;&#25968;&#65306;<span id="hitOverTotal">0 / 0</span>
        </p>
      </div>

      <div class="log-list" id="logList" aria-label="&#12525;&#12464;&#19968;&#35239;"></div>

      <button type="button" id="resetLogBtn" class="chip clear log-reset-btn">
        &#24403;&#26085;&#12398;&#12525;&#12464;&#12434;&#12522;&#12475;&#12483;&#12488;
      </button>
    </section>

    <!-- &#25237;&#36039;&#65288;&#20206;&#30906;&#23450;&#65289; -->
    <section class="card" id="investCard">
      <div class="play-source-tabs" role="group" aria-label="&#12503;&#12524;&#12452;&#31278;&#21029;">
        <button type="button" class="chip state is-active" id="playCashBtn">&#29694;&#37329;</button>
        <button type="button" class="chip neutral" id="playOwnedBtn">&#25345;&#12385;&#29577;</button>
      </div>

      <label>
        &#25237;&#36039;&#38989;&#65288;&#20170;&#22238;&#36861;&#21152;&#20998;&#65289;
        <input type="number" id="investYen" inputmode="numeric" min="0" step="500"/>
      </label>

      <label id="ownedUseLabel" class="is-hidden">
        &#25345;&#12385;&#29577;&#20351;&#29992;&#65288;&#29577;&#65289;
        <input type="number" id="ownedUseBalls" inputmode="numeric" min="0" step="125"/>
      </label>

      <p id="investConfirmed" class="invest-confirmed">&#29694;&#37329;&#25237;&#36039;&#65306;0 &#20870;</p>
      <p id="ownedConfirmed" class="invest-confirmed">&#25345;&#12385;&#29577;&#20351;&#29992;&#65306;0&#29577;</p>

      <div class="invest-buttons" role="group" aria-label="&#25237;&#36039;&#38989;&#12398;&#25805;&#20316;">
        <div class="invest-row">
          <button type="button" class="chip" id="add500">+500&#20870;</button>
          <button type="button" class="chip" id="add1000">+1000&#20870;</button>
          <button type="button" class="chip" id="add5000">+5000&#20870;</button>
        </div>

        <div class="invest-row">
          <button type="button" class="chip sub" id="sub500">-500&#20870;</button>
          <button type="button" class="chip neutral" id="skipInvest">&#36861;&#21152;&#28961;&#12375;</button>
          <button type="button" class="chip clear" id="clearInvest">&#12463;&#12522;&#12450;</button>
          <button class="chip undo" id="undoInvest">&#25147;&#12377;</button>
        </div>
      </div>

      <button type="button" id="calcBtn">&#29694;&#37329;&#12434;&#25237;&#20837;</button>
      <button type="button" id="ownedUseBtn" class="is-hidden">&#25345;&#12385;&#29577;&#12434;&#25237;&#20837;</button>

      <p id="result" aria-live="polite"></p>
    </section>

    <!-- expectation calculation -->
    <section class="card" id="finalCalcCard">
      <button type="button" id="finalCalcBtn">&#26399;&#24453;&#20516;&#35336;&#31639;</button>

      <p id="finalResult" class="final-result" aria-live="polite"></p>

      <div class="rate-meter rate-meter--compact is-hidden" id="finalRateMeter" aria-label="&#20170;&#22238;&#12398;&#22238;&#36578;&#29575;&#12513;&#12540;&#12479;&#12540;">
        <div class="rate-meter__scale">
          <span id="finalMeterMin" class="rate-meter__tick">&#8212;</span>
          <span class="rate-meter__tick rate-meter__center">
            <span id="finalMeterBorderValue" class="rate-meter__border-value">&#8212;</span>
            <span>&#12508;&#12540;&#12480;&#12540;</span>
          </span>
          <span id="finalMeterMax" class="rate-meter__tick">&#8212;</span>
        </div>

        <div class="rate-meter__bar">
          <div class="rate-meter__border"></div>
          <div class="rate-meter__needle" id="finalMeterNeedle" style="left:50%"></div>
        </div>

        <div class="rate-meter__labels">
          <span>&#20302;&#12356;</span>
          <span>&#39640;&#12356;</span>
        </div>
      </div>
    </section>

    <!-- &#32047;&#35336; -->
    <section class="card" id="totalCard">
      <h2 class="section-title">&#27231;&#31278;&#21029;&#32047;&#35336;</h2>
      <div id="machineTotalCards" class="machine-total-cards"></div>
      <p id="totalSpin">&#21021;&#24403;&#12383;&#12426;&#30906;&#29575;&#65306;</p>
      <p id="totalInvest">&#32047;&#35336;&#25237;&#36039;&#65306;0 &#20870;</p>
      <p id="avgRate">&#32047;&#35336;&#22238;&#36578;&#29575;&#65306;0 &#22238;/k</p>
      <p id="total">&#32047;&#31309;&#26399;&#24453;&#20516;&#65306;0 &#29577;</p>

      <div class="goal">
        <p class="goal-title"></p>
        <progress id="goalBar" value="0" max="1000000"></progress>
        <p id="percent">&#36948;&#25104;&#29575;&#65306;0.0 %</p>
      </div>

      <p class="note">&#8251;&#36890;&#24120;&#12508;&#12540;&#12480;&#12540;&#12399;&#36984;&#25246;&#20132;&#25563;&#29575;&#12289;&#30495;&#12508;&#12540;&#12480;&#12540;&#12399;&#25345;&#12385;&#29577;&#27604;&#29575;&#12434;&#21152;&#21619;&#12289;&#26399;&#24453;&#20516;&#12399;&#31561;&#20385;&#25563;&#31639;&#12391;&#12377;</p>
      <button type="button" id="resetBtn">&#12522;&#12475;&#12483;&#12488;</button>
    </section>

  </main>

  <!-- scripts: machines -> app -->
  <nav class="bottom-tabs" aria-label="&#23455;&#32318;&#34920;&#31034;&#20999;&#12426;&#26367;&#12360;">
    <button type="button" id="totalTabAll" class="bottom-tab">
      &#20840;&#27231;&#31278;
    </button>
    <button type="button" id="totalTabSelected" class="bottom-tab is-active">
      &#36984;&#25246;&#27231;&#31278;
    </button>
  </nav>

  <div id="machinePickerOverlay" class="machine-picker-overlay is-hidden" aria-hidden="true"></div>
  <section
    id="machinePickerModal"
    class="machine-picker-modal is-hidden"
    aria-label="&#27231;&#31278;&#26908;&#32034;"
    role="dialog"
    aria-modal="true"
  >
    <div class="machine-picker-header">
      <h2>&#27231;&#31278;&#12434;&#36984;&#25246;</h2>
      <button type="button" id="machinePickerClose" class="machine-picker-close" aria-label="&#38281;&#12376;&#12427;">&times;</button>
    </div>
    <input
      type="search"
      id="machineSearchInput"
      class="machine-search-input"
      placeholder="&#27231;&#31278;&#21517;&#12539;&#12513;&#12540;&#12459;&#12540;&#12539;&#12473;&#12506;&#12483;&#12463;&#12391;&#26908;&#32034;"
      autocomplete="off"
    />
    <div class="machine-picker-tabs" role="tablist" aria-label="&#27231;&#31278;&#12459;&#12486;&#12468;&#12522;">
      <button type="button" class="machine-picker-tab is-active" data-machine-filter="all">&#12377;&#12409;&#12390;</button>
      <button type="button" class="machine-picker-tab" data-machine-filter="favorite">&#12362;&#27671;&#12395;&#20837;&#12426;</button>
      <button type="button" class="machine-picker-tab" data-machine-filter="recent">&#26368;&#36817;</button>
    </div>
    <div id="machinePickerList" class="machine-picker-list"></div>
  </section>

  <div id="storePickerOverlay" class="store-picker-overlay is-hidden" aria-hidden="true"></div>
  <section
    id="storePickerModal"
    class="store-picker-modal is-hidden"
    aria-label="&#24215;&#33303;&#26908;&#32034;"
    role="dialog"
    aria-modal="true"
  >
    <div class="store-picker-header">
      <h2>&#24215;&#33303;&#12434;&#36984;&#25246;</h2>
      <button type="button" id="storePickerClose" class="store-picker-close" aria-label="&#38281;&#12376;&#12427;">&times;</button>
    </div>
    <input
      type="search"
      id="storeSearchInput"
      class="store-search-input"
      placeholder="&#24215;&#33303;&#21517;&#12391;&#26908;&#32034;"
      autocomplete="off"
    />
    <div id="storePickerList" class="store-picker-list"></div>
  </section>

  <script src="./machines.js"></script>
  <script src="./app.js"></script>

  <!-- mid-check overlay -->
  <div id="midOverlay" class="mid-overlay is-hidden" aria-hidden="true"></div>

  <!-- mid-check modal -->
  <div id="midCheckCard" class="card mid-modal is-hidden" aria-label="途中経過">
    <h3 class="section-title">&#36884;&#20013;&#32076;&#36942;</h3>

    <div class="rate-meter" id="midRateMeter" aria-label="&#22238;&#36578;&#29575;&#12513;&#12540;&#12479;&#12540;">
      <div class="rate-meter__scale">
        <span id="midMeterMin" class="rate-meter__tick">&#8212;</span>
        <span id="midMeterCenter" class="rate-meter__tick rate-meter__center">
          <span id="midMeterBorderValue" class="rate-meter__border-value">&#8212;</span>
          <span>&#12508;&#12540;&#12480;&#12540;</span>
        </span>
        <span id="midMeterMax" class="rate-meter__tick">&#8212;</span>
      </div>

      <div class="rate-meter__bar">
        <div class="rate-meter__border"></div>
        <div class="rate-meter__needle" id="midMeterNeedle" style="left:50%"></div>
      </div>

      <div class="rate-meter__labels">
        <span>&#20302;&#12356;</span>
        <span>&#39640;&#12356;</span>
      </div>
    </div>

<label class="mid-balls-input">
  &#29694;&#22312;&#12398;&#25345;&#12385;&#29577;
  <input type="number" id="midBallsNow" inputmode="numeric" />
</label>
<button type="button" class="chip state" id="midBallsConfirm">&#35336;&#31639;</button>

    <div class="kv-list">
      <div class="kv-row">
        <span class="kv-key">&#22238;&#36578;&#25968;</span>
        <span class="kv-val" id="midSpinVal">&#8212;</span>
      </div>

      <div class="kv-row">
        <span class="kv-key">&#29694;&#22312;&#12398;&#22238;&#36578;&#29575;</span>
        <span class="kv-val" id="midRateVal">&#8212;</span>
      </div>

      <div class="kv-row">
        <span class="kv-key">&#24046;</span>
        <span class="kv-val" id="midDiffVal">&#8212;</span>
      </div>
    </div>

    <!-- close button -->
    <button id="midCheckClose" type="button" class="chip clear">&#38281;&#12376;&#12427;</button>
  </div>

</body>
</html>
